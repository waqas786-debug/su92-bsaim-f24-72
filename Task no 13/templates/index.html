<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accident Severity Predictor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 5px; text-align: center; }
        .Severe { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .Moderate { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .Minor { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0 text-center">Accident Severity Predictor</h3>
                    </div>
                    <div class="card-body">
                        <form action="/predict" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Speed Limit (km/h)</label>
                                <input type="number" name="speed_limit" class="form-control" placeholder="e.g. 60" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Driver Alcohol Level</label>
                                <input type="number" step="0.01" name="alcohol_level" class="form-control" placeholder="e.g. 0.05" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Weather Conditions</label>
                                <select name="weather" class="form-select">
                                    {% for opt in options['Weather Conditions'] %}
                                    <option value="{{ opt }}">{{ opt }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Road Type</label>
                                <select name="road_type" class="form-select">
                                    {% for opt in options['Road Type'] %}
                                    <option value="{{ opt }}">{{ opt }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Vehicle Condition</label>
                                <select name="vehicle_condition" class="form-select">
                                    {% for opt in options['Vehicle Condition'] %}
                                    <option value="{{ opt }}">{{ opt }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Predict Severity</button>
                        </form>

                        {% if prediction %}
                        <div class="result-box {{ prediction }}">
                            <h4>Predicted Severity: <strong>{{ prediction }}</strong></h4>
                        </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
